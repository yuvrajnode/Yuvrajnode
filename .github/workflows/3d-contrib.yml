# Save as: .github/workflows/3d-contrib.yml  (in your yuvrajnode/yuvrajnode repo)
# Generates an isometric 3D "contribution city" SVG daily.
# First run: Actions tab → "generate 3d contribution graph" → Run workflow.
name: generate 3d contribution graph

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update 3d contribution graph" || echo "nothing to commit"
          git push
